<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// Scene setup
const container = document.getElementById("model");
const scene = new THREE.Scene();

// Camera
const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
camera.position.z = 5; // ✅ ensure camera is visible from start

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Light
const light = new THREE.HemisphereLight(0xffffff, 0x444444, 2); // ✅ slightly stronger
scene.add(light);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.minDistance = 1;
controls.maxDistance = 10;

// Load Model
let tulsiModel;
const loader = new THREE.GLTFLoader();
loader.load(
    'tulsi.glb',   // ✅ keep file in same folder OR use correct path
    function (gltf) {
        tulsiModel = gltf.scene;

        const box = new THREE.Box3().setFromObject(tulsiModel);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        tulsiModel.position.sub(center);

        const maxDim = Math.max(size.x, size.y, size.z);
        const fov = camera.fov * (Math.PI / 180);
        let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
        camera.position.z = cameraZ * 1.5;

        scene.add(tulsiModel);
    },
    undefined,
    function (error) {
        console.error("Error loading model:", error); // ✅ debugging help
    }
);

// Resize
window.addEventListener('resize', () => {
    const width = container.clientWidth;
    const height = container.clientHeight;
    renderer.setSize(width, height);
    camera.aspect = width / height;
    camera.updateProjectionMatrix();
});

// Animate
function animate() {
    requestAnimationFrame(animate);
    if (tulsiModel) tulsiModel.rotation.y += 0.005;
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>
