<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plants - E-Herbal Garden</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* BODY */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(to right,#eef7ee,#d0f0d0);
  overflow-x:hidden;
}

/* ===== UPDATED HEADER ===== */
.header{
  display:flex;
  flex-direction:column;
  background:linear-gradient(to right,#1b5e20,#0d3d14);
  color:white;
}

/* TOP BAR */
.header-top{
  display:flex;
  align-items:center;
  padding:15px 30px;
}

.logo{
  width:50px;
  border-radius:50%;
  margin-right:10px;
}

.header-top h2{
  margin:0;
  color:white;
}

/* NAV BAR */
nav{
  display:flex;
  justify-content:center;
  gap:80px;
  padding:15px 0;
  background:rgba(0,0,0,0.1);
}

nav a{
  text-decoration:none;
  color:white;
  font-weight:500;
  letter-spacing:0.5px;
  transition:0.3s;
}

nav a:hover{
  color:#a5d6a7;
}
/* ===== END HEADER ===== */

/* TITLE */
h2{
  text-align:center;
  color:#1b5e20;
  margin-top:20px;
}

/* SEARCH BOX */
.search-box{
  display:flex;
  justify-content:center;
  margin:30px;
}

.search-row{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.input-container{
  display:flex;
  align-items:center;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  border-radius:30px;
  padding:5px 10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
  position:relative;
}

.input-container input{
  padding:10px;
  width:220px;
  border:none;
  outline:none;
  background:transparent;
  font-size:14px;
}

.clear-btn{
  cursor:pointer;
  padding:5px;
}

.search-btn{
  background:#4caf50;
  border:none;
  padding:10px 12px;
  border-radius:50%;
  cursor:pointer;
  color:white;
}

.search-btn:hover{
  background:#2e7d32;
}

/* FILTER */
.filter-select{
  display:flex;
  align-items:center;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  border-radius:30px;
  padding:5px 10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.filter-select select{
  border:none;
  outline:none;
  background:transparent;
  padding:10px;
  cursor:pointer;
}

/* SUGGESTION */
.suggestion-box{
  position:absolute;
  top:110%;
  left:0;
  width:100%;
  background:white;
  border-radius:10px;
  padding:10px;
  display:none;
  z-index:999;
}

/* PLANTS GRID */
.plant-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:25px;
  padding:40px;
}

/* CARD */
.plant-card{
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:15px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  transition:0.4s;
  cursor:pointer;
  overflow:hidden;
}

.plant-card img{
  width:100%;
  height:160px;
  object-fit:contain;
  transition:0.4s;
}

.plant-card:hover img{
  transform:scale(1.1);
}

.plant-card:hover{
  transform:translateY(-12px) scale(1.03);
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.plant-card h3{
  color:#1b5e20;
  margin:10px 0 5px;
}

.plant-card p{
  font-size:12px;
  color:#444;
}
</style>
</head>

<body>

<!-- ===== UPDATED HEADER ===== -->
<header class="header">

  <div class="header-top">
    <img src="logo.png" class="logo">
    <h2>E-Herbal Garden</h2>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="hellochalja.html">Plants</a>
    <a href="shop.html">Shop</a>
    <a href="about.html">About</a>
  </nav>

</header>
<!-- ===== END HEADER ===== -->

<h2>🌿 Medicinal Plants</h2>

<div class="search-box">
  <div class="search-row">

    <div class="input-container">
      <input type="text" id="plantName" placeholder="Search plants..." 
      oninput="showSuggestion()" 
      onkeypress="handleEnter(event)">
      <span class="clear-btn" onclick="clearSearch()">✖</span>
      <button class="search-btn" onclick="applyFilters()">🔍</button>
      <div id="suggestionBox" class="suggestion-box" onclick="applySuggestion()"></div>
    </div>

    <div class="filter-select">
      <select id="filterOption" onchange="applyFilters()">
        <option value="">Filter</option>
        <optgroup label="Uses">
          <option value="immunity">Immunity</option>
          <option value="skin">Skin</option>
          <option value="digestion">Digestion</option>
          <option value="stress">Stress</option>
          <option value="heart">Heart</option>
        </optgroup>
        <optgroup label="Habitat">
          <option value="tropical">Tropical</option>
          <option value="dry">Dry</option>
          <option value="temperate">Temperate</option>
          <option value="wet">Wet</option>
        </optgroup>
      </select>
    </div>

  </div>
</div>

<div class="plant-container" id="plantContainer"></div>

<script>
let plantsData = [];
fetch("plant.json")
.then(res => res.json())
.then(data => {
plantsData = data;
displayPlants(plantsData);
});

const plantLinks = {
"Tulsi": "tulsi.html",
"Neem": "neem.html",
"Aloe Vera": "aloevera.html",
"Ashwagandha": "ashwagandha.html",
"Mint": "mint.html",
"Ginger": "ginger.html",
"Turmeric": "turmeric.html",
"Brahmi": "brahmi.html",
"Amla": "amla.html",
"Giloy": "giloy.html",
"Lemongrass": "lemongrass.html",
"Shatavari": "shatavari.html",
"Arjuna": "arjuna.html",
"Bael": "bael.html",
"Clove": "clove.html",
"Cinnamon": "cinnamon.html",
"Black pepper": "blackpepper.html",
"Cardamom": "cardamom.html",
"Saffron": "saffron.html",
"Fenugreek": "fenugreek.html",
"Curry Leaves": "curryleaves.html",
"Drumstick": "drumstick.html",
"Hibiscus": "hibiscus.html",
"Rosemary": "rosemary.html",
"Lavender": "lavender.html",
"Chamomile": "chamomile.html",
"Dandelion": "dandelion.html",
"Eucalyptus": "eucalyptus.html",
"Garlic": "garlic.html",
"Onion": "onion.html",
"Spinach": "spinach.html",
"Coriander": "coriander.html",
"Parsley": "parsley.html",
"Thyme": "thyme.html",
"Oregano": "oregano.html",
"Basil": "basil.html",
"Peppermint": "peppermint.html",
"Sage": "sage.html",
"Fennel": "fennel.html",
"Mustard": "mustard.html"
};

function displayPlants(data){
let container = document.getElementById("plantContainer");
container.innerHTML = "";
data.forEach(plant => {
let link = plantLinks[plant.commonName] || "#";
container.innerHTML += `
<div class="plant-card">
<a href="${link}" style="text-decoration:none; color:inherit;">
<img src="${plant.image}">
<h3>${plant.commonName}</h3>
<p>${plant.botanicalName}</p>
</a>
</div>
`;
});
}

function handleEnter(e){
if(e.key==="Enter") applyFilters();
}

function applyFilters(){
let input = document.getElementById("plantName").value.toLowerCase();
let option = document.getElementById("filterOption").value;

let filtered = plantsData.filter(p =>
p.commonName.toLowerCase().includes(input)
);

if(["immunity","skin","digestion","stress","heart"].includes(option)){
filtered = filtered.filter(p => p.uses.toLowerCase().includes(option));
}
else if(["tropical","dry","temperate","wet"].includes(option)){
filtered = filtered.filter(p => p.habitat.toLowerCase().includes(option));
}

displayPlants(filtered);
}

function showSuggestion(){
let input = document.getElementById("plantName").value;
let box = document.getElementById("suggestionBox");

if(input.trim()===""){
box.style.display="none";
return;
}

box.style.display="block";
box.innerHTML = `Search for "<b>${input}</b>"`;
}

function applySuggestion(){
applyFilters();
document.getElementById("suggestionBox").style.display="none";
}

function clearSearch(){
document.getElementById("plantName").value="";
document.getElementById("suggestionBox").style.display="none";
displayPlants(plantsData);
}
</script>

</body>
</html>
