<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plants - E-Herbal Garden</title>

<style>

/* BODY */
body{
  margin:0;
  font-family:Arial;
  background:#eef7ee;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:15px;
  background:linear-gradient(45deg,#2e7d32,#1b5e20);
  color:white;
  padding:15px 25px;
}
.logo{
  width:60px;
  height:60px;
  border-radius:50%;
}
.header h1{
  margin:0;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:center;
  gap:30px;
  background:#133d13;
  padding:12px;
  position:sticky;
  top:0;
  z-index:1000;
}
nav a{
  color:white;
  text-decoration:none;
  font-weight:bold;
}
nav a:hover{
  color:#90ee90;
}

/* SEARCH */
.search{
  text-align:center;
  margin:20px;
}
.search input{
  padding:10px;
  width:250px;
  border-radius:5px;
  border:1px solid #ccc;
}
.search button{
  padding:10px;
  background:#2e7d32;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
.search button:hover{
  background:#1b5e20;
}

/* PLANT CARDS */
.plant-container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}
.plant-card{
  width:220px;
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 5px 10px rgba(0,0,0,0.1);
  transition:0.3s;
  cursor:pointer;
}
.plant-card:hover{
  transform:scale(1.05);
}
.plant-card img{
  width:100%;
  height:150px;
  object-fit:contain;
  display:block;
  margin:0 auto 10px;
}
.plant-card p{
  font-size:12px;
  color:#555;
}

</style>
</head>

<body>

<header class="header">
  <img src="logo.png" class="logo">
  <h1>E-Herbal Garden</h1>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="plant.html">Plants</a>
  <a href="about.html">About</a>
  <a href="#">Contact</a>
</nav>

<h2 style="text-align:center; color:#2e7d32; margin-top:20px;">
🌿 Medicinal Plants
</h2>

<div class="search">
  <input type="text" id="plantName" placeholder="Search plant (Tulsi, Neem)">
  <button onclick="searchPlant()">Search</button>
</div>

<div class="plant-container" id="plantContainer"></div>

<script>

let plantsData = [];

// FETCH JSON
fetch("plant.json")
.then(res => res.json())
.then(data => {
  plantsData = data;
  displayPlants(plantsData);
});

// 🔗 LINK MAPPING
const plantLinks = {
  "Tulsi": "tulsi.html",
  "Aloe Vera": "aloe.html",
  "Neem": "neem.html",
  "Mint": "mint.html",
  "Onion": "onion.html"
};

// DISPLAY PLANTS
function displayPlants(data){
  let container = document.getElementById("plantContainer");
  container.innerHTML = "";

  data.forEach(plant => {

    let link = plantLinks[plant.commonName] || "#";

    container.innerHTML += `
      <div class="plant-card">
        <a href="${link}" style="text-decoration:none; color:inherit;">
          <img src="${plant.image}" alt="${plant.commonName}">
          <h3>${plant.commonName}</h3>
          <p>${plant.botanicalName}</p>
        </a>
      </div>
    `;
  });
}

// SEARCH FUNCTION
function searchPlant(){
  let input = document.getElementById("plantName").value.toLowerCase();

  let filtered = plantsData.filter(plant =>
    plant.commonName.toLowerCase().includes(input)
  );

  displayPlants(filtered);
}

</script>

</body>
</html>
