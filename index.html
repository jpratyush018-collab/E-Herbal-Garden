<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:linear-gradient(to right,#eef7ee,#d0f0d0);
}
/* keep all your styles exactly same */
</style>
</head>

<body>

<!-- ✅ YOUR ORIGINAL CONTENT (UNCHANGED) -->

<div class="announcement">
  <p>
    🌿 Explore our 3D Plant Viewer! Rotate, zoom and interact with herbal plants in 3D 🌱 ➤ Available now in Plants section
  </p>
</div>

<header class="header">
    <img src="logo.png" class="logo">
    <h1><i>E-Herbal Garden</i></h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="index.html">Plants</a>
<a href="about.html">About</a>
<a href="#">Contact</a>
</nav>

<div class="hero">
<h1>🌿 Welcome to the Digital Herbal Garden 🌿</h1>
</div>

<!-- 🔥 ADD THIS (ONLY NEW PART) -->
<div id="plant-container"></div>

<!-- ✅ YOUR ORIGINAL CARDS REMAIN SAME BELOW -->

<footer>© 2026 E-Herbal Garden | Designed with 🌱 | Created by Team Beginners | </footer>

<!-- 🔥 FIXED SCRIPT (MOVED HERE, NO CONTENT CHANGE) -->
<script>
document.addEventListener("DOMContentLoaded", () => {

const container = document.getElementById("plant-container");
const params = new URLSearchParams(window.location.search);
const plantName = params.get("plant");

fetch("plant.json")
  .then(res => res.json())
  .then(plants => {

    if (plantName && plants[plantName]) {
      const plant = plants[plantName];

      container.innerHTML = `
        <h1>${plant.name}</h1>
        <img src="${plant.img}" alt="${plant.name}">
        <p>${plant.desc}</p>

        <model-viewer 
          src="${plant.model}" 
          auto-rotate 
          camera-controls 
          style="width:100%; height:300px;">
        </model-viewer>
      `;
    } 
    else {
      let list = "<h2>Select a Plant 🌱</h2>";

      for (let key in plants) {
        list += `<a href="?plant=${key}">${plants[key].name}</a><br><br>`;
      }

      container.innerHTML = list;
    }

  })
  .catch(err => {
    container.innerHTML = "Error loading data!";
  });

});
</script>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

</body>
</html>
