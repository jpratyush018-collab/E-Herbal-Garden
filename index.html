<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Herbal Garden</title>
<style>
html { scroll-behavior: smooth; }

/* FADE-UP BANNER WITH MARQUEE */
.announcement {
  width: 100%;
  height: 80px;
  background: linear-gradient(90deg,#1b5e20,#2e7d32,#4caf50);
  color: #fff;
  overflow: hidden;
  white-space: nowrap;
  border-radius: 0;
  margin: 0;
  opacity: 0;
  transform: translateY(30px);
  animation: fadeUpBanner 1s ease forwards;
  display: flex;
  align-items: center;
}
.announcement p {
  display: inline-block;
  padding-left: 100%;
  animation: scrollText 25s linear infinite;
  font-size: 13px;
  font-weight: 500;
}
.announcement:hover p { animation-play-state: paused; }

@keyframes fadeUpBanner {
  0% { opacity:0; transform:translateY(30px);}
  100% {opacity:1; transform:translateY(0);}
}
@keyframes scrollText {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

/* HEADER */
.header {
  display:flex;
  align-items:center;
  gap:15px;
  background:linear-gradient(45deg,#2e7d32,#1b5e20,#0d3d0d);
  color:white;
  padding:15px 25px;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
}
.logo {
  width:60px;
  height:60px;
  border-radius:50%;
  border:2px solid white;
}
.header h1 {
  font-size:28px;
  margin:0;
}

/* NAVBAR */
nav {
  display:flex;
  justify-content:center;
  gap:40px;
  background:linear-gradient(90deg,#133d13,#1b5e20);
  padding:14px;
  position:sticky;
  top:0;
  z-index:1000;
}
nav a {
  color:white;
  text-decoration:none;
  font-weight:600;
  padding:8px 16px;
  border-radius:20px;
  transition:all 0.3s ease;
}
nav a:hover {
  background: rgba(144,238,144,0.2);
  transform:translateY(-2px);
}

/* HERO */
.hero {
  height:500px;
  background:url("pic1.png") no-repeat center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}
.hero::before {
  content:'';
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
}
.hero h1 {
  position:relative;
  color:white;
  font-size:36px;
  padding:20px 40px;
  border-radius:20px;
  backdrop-filter:blur(15px);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  animation:heroGlow 2s ease-in-out infinite alternate;
}
@keyframes heroGlow {
  0%{box-shadow:0 10px 30px rgba(0,0,0,0.3);}
  100%{box-shadow:0 10px 40px rgba(76,175,80,0.5);}
}

/* TIMELINE SECTION */
.history-section{
  background:linear-gradient(135deg,#e8f5e9,#c8e6c9);
  padding:60px 50px;
  position:relative;
}
.history-section h2{
  text-align:center;
  font-size:36px;
  color:#1b5e20;
  margin-bottom:40px;
}
.history-timeline{
  position: relative;
  max-width:800px;
  margin:0 auto;
  padding-left:40px;
}
.history-timeline::before{
  content:'';
  position:absolute;
  left:20px;
  top:0;
  width:4px;
  height:100%;
  background:#4caf50;
  border-radius:2px;
}
.timeline-item{
  position:relative;
  background:rgba(255,255,255,0.9);
  margin-bottom:40px;
  padding:20px 25px;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  opacity:0;
  transform: translateY(30px);
  transition:0.6s ease;
}
.timeline-item::before{
  content:'';
  position:absolute;
  left:-32px;
  top:20px;
  width:16px;
  height:16px;
  background:#4caf50;
  border-radius:50%;
}
.timeline-item h3{ margin:0 0 10px; color:#1b5e20; }
.timeline-item p{ margin:0; line-height:1.6; color:#444; }

/* CARDS */
.card-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
  padding:50px;
}
.card{
  background:rgba(255,255,255,0.95);
  padding:30px;
  border-radius:25px;
  text-align:center;
  cursor:pointer;
  opacity:0;
  transform:translateY(30px);
}
.details{ display:none; }

/* CONTACT */
#contact{
  background: linear-gradient(135deg,#1b5e20,#2e7d32);
  color:white;
  padding:50px;
  text-align:center;
}

/* CHAT BUTTON (already present) */
#chat-toggle{
  position:fixed;
  bottom:20px;
  right:20px;
  background:linear-gradient(135deg,#4caf50,#2e7d32);
  color:white;
  width:65px;
  height:65px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  cursor:pointer;
  z-index:99999;
}

/* NEW CHATBOX */
#chatbot-box{
  position:fixed;
  bottom:100px;
  right:20px;
  width:320px;
  max-height:420px;
  background:white;
  border-radius:15px;
  display:none;
  flex-direction:column;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  z-index:99999;
}
</style>

<script>
function toggleDetails(card){
  const detail = card.querySelector('.details');
  const isVisible = detail.style.display === 'block';
  document.querySelectorAll('.details').forEach(d=>d.style.display='none');
  detail.style.display = isVisible?'none':'block';
}

document.addEventListener('DOMContentLoaded',()=>{

  const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.style.opacity='1';
        entry.target.style.transform='translateY(0)';
      }
    });
  });

  document.querySelectorAll('.card, .timeline-item').forEach(el=>{
    observer.observe(el);
  });

  // CHAT TOGGLE
  const chatToggle = document.getElementById('chat-toggle');
  const chatBox = document.getElementById('chatbot-box');

  chatToggle.onclick = () => {
    chatBox.style.display = chatBox.style.display === 'flex' ? 'none' : 'flex';
  };

});

// CHAT FUNCTIONS
function sendMessage(){
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if(!msg) return;

  addMsg("You", msg);
  input.value = "";

  setTimeout(()=>{
    addMsg("Bot", getReply(msg.toLowerCase()));
  },500);
}

function addMsg(sender,text){
  const div = document.createElement('div');
  div.style.marginBottom="10px";
  div.innerHTML = `<strong>${sender}:</strong> ${text}`;
  document.getElementById('chat-messages').appendChild(div);
}

function getReply(msg){
  if(msg.includes("hi") || msg.includes("hello"))
    return "Hello 🌿! Welcome to E-Herbal Garden.";

  if(msg.includes("ayurveda"))
    return "Ayurveda is a 5000-year-old natural healing system 🌱.";

  if(msg.includes("tulsi"))
    return "Tulsi boosts immunity and helps in cold & cough 🌿.";

  if(msg.includes("aloe"))
    return "Aloe Vera is great for skin and digestion 🌱.";

  if(msg.includes("shop"))
    return "Visit our Shop section 🛒 to explore herbal products.";

  return "Ask me about Ayurveda or plants 🌿.";
}

document.addEventListener("keypress",function(e){
  if(e.key==="Enter") sendMessage();
});
</script>
</head>

<body>

<!-- YOUR FULL ORIGINAL BODY (UNCHANGED) -->

<div class="announcement">
<p>🌿 Explore our 3D Plant Viewer! Rotate, zoom & interact with herbal plants 🌱</p>
</div>

<header class="header">
<img src="logo.png" class="logo">
<h1>E-Herbal Garden</h1>
</header>

<nav>
<a href="#home">Home</a>
<a href="hellochalja.html">Plants</a>
<a href="shop.html">Shop</a>
<a href="about.html">About</a>
<a href="#contact">Contact</a>
</nav>

<div class="hero">
<h1>🌿 Welcome to the Digital Herbal Garden 🌿</h1>
</div>

<div class="card-container">
<div class="card" onclick="toggleDetails(this)">
<h3>Tulsi</h3>
<div class="details">Boosts immunity 🌿</div>
</div>
</div>

<section id="contact">
<h2>📞 Contact Us</h2>
<p>Email: eherbalgarden@gmail.com</p>
</section>

<!-- EXISTING BUTTON -->
<div id="chat-toggle">💬</div>

<!-- ✅ ADDED CHATBOX -->
<div id="chatbot-box">
  <div style="background:#2e7d32;color:white;padding:10px;text-align:center;">
    🌿 Herbal Assistant
  </div>

  <div id="chat-messages" style="padding:10px;height:250px;overflow-y:auto;"></div>

  <div style="display:flex;border-top:1px solid #ccc;">
    <input id="chat-input" type="text" placeholder="Ask about herbs..." style="flex:1;padding:10px;border:none;">
    <button onclick="sendMessage()" style="background:#4caf50;color:white;border:none;padding:10px;">Send</button>
  </div>
</div>

</body>
</html>
