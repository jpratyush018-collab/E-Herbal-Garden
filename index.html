<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Herbal Garden</title>

<style>
body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:linear-gradient(to right,#eef7ee,#d0f0d0);
}

.announcement{
width:100%;
margin:5px auto;
background:linear-gradient(90deg,#1b5e20,#2e7d32);
color:#fff;
overflow:hidden;
white-space:nowrap;
border-radius:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

.announcement p{
display:inline-block;
padding:2px 0;
margin:0;
font-size:13px;
font-weight:500;
line-height:1.2;
animation:scrollText 20s linear infinite;
}

@keyframes scrollText{
0%{transform: translateX(100%);} 
100%{transform: translateX(-100%);} 
}

.header{
display:flex;
align-items:center;
gap:15px;
background:linear-gradient(45deg,#2e7d32,#1b5e20);
color:white;
padding:15px 25px;
}

.logo{
width:60px;
height:60px;
border-radius:50%;
border:2px solid white;
}

nav{
display:flex;
justify-content:center;
gap:40px;
background:#133d13;
padding:14px;
}

nav a{
color:white;
text-decoration:none;
font-weight:600;
}

.hero{
height:400px;
background:url("pic1.png") no-repeat center/cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.card-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card img{
width:80px;
}

#plant-container{
padding:30px;
}

</style>
</head>

<body>

<div class="announcement">
<p>🌿 Explore our 3D Plant Viewer! Rotate, zoom and interact with herbal plants 🌱</p>
</div>

<header class="header">
<img src="logo.png" class="logo">
<h1>E-Herbal Garden</h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="index.html">Plants</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<div class="hero">
<h1>🌿 Welcome to the Digital Herbal Garden 🌿</h1>
</div>

<!-- 🔥 Dynamic Content -->
<div id="plant-container"></div>

<footer style="background:#1b5e20;color:white;text-align:center;padding:15px;">
© 2026 E-Herbal Garden
</footer>

<script>
document.addEventListener("DOMContentLoaded", () => {

const container = document.getElementById("plant-container");
const params = new URLSearchParams(window.location.search);
const plantName = params.get("plant");

fetch("plant.json")
.then(res => res.json())
.then(plants => {

if (plantName && plants[plantName]) {
const plant = plants[plantName];

container.innerHTML = `
<h1>${plant.name}</h1>
<img src="${plant.img}" style="width:100%;max-width:400px;">
<p>${plant.desc}</p>

<model-viewer 
src="${plant.model}" 
auto-rotate 
camera-controls 
style="width:100%; height:300px;">
</model-viewer>
`;

} else {
let list = "<h2>Select a Plant 🌱</h2><div class='card-container'>";

for (let key in plants) {
list += `
<div class="card">
<a href="?plant=${key}">
<img src="${plants[key].img}">
<h3>${plants[key].name}</h3>
</a>
</div>
`;
}

list += "</div>";
container.innerHTML = list;
}

})
.catch(err => {
container.innerHTML = "Error loading data";
});

});
</script>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

</body>
</html>
