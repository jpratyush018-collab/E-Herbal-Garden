<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plants - E-Herbal Garden</title>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/controls/OrbitControls.js"></script>

<style>

/* BODY */
body{
margin:0;
font-family:Arial;
background:#eef7ee;
}

/* HEADER */
.header{
display:flex;
align-items:center;
gap:15px;
background:linear-gradient(45deg,#2e7d32,#1b5e20);
color:white;
padding:15px 25px;
}

.logo{
width:60px;
height:60px;
border-radius:50%;
}

.header h1{
margin:0;
}

/* NAVBAR */
nav{
display:flex;
justify-content:center;
gap:30px;
background:#133d13;
padding:12px;
position:sticky;
top:0;
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#90ee90;
}

/* SEARCH */
.search{
text-align:center;
margin:20px;
}

.search input{
padding:10px;
width:250px;
border-radius:5px;
border:1px solid #ccc;
}

.search button{
padding:10px;
background:#2e7d32;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.search button:hover{
background:#1b5e20;
}

/* PLANT CARDS */
.plant-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.plant-card{
width:220px;
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.3s;
}

.plant-card:hover{
transform:scale(1.05);
}

.plant-card img{
width:100%;
height:150px;
object-fit:contain;
display:block;
margin:0 auto 10px;
}

.plant-card p{
font-size:12px;
color:#555;
}

/* POPUP */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
padding:20px;
border-radius:10px;
width:320px;
text-align:center;
position:relative;
}

.popup-content span{
position:absolute;
top:10px;
right:15px;
cursor:pointer;
font-size:18px;
}

/* 3D MODEL */
#modelContainer{
margin-top:10px;
width:100%;
height:200px;
background:#ddd;
}

</style>

</head>

<body>

<!-- HEADER -->
<header class="header">
    <img src="logo.png" class="logo">
    <h1>E-Herbal Garden</h1>
</header>

<!-- NAVBAR -->
<nav>
<a href="index.html">Home</a>
<a href="plant.html">Plants</a>
<a href="about.html">About</a>
<a href="#">Contact</a>
</nav>

<h2 style="text-align:center; color:#2e7d32; margin-top:20px;">
🌿 Medicinal Plants
</h2>

<!-- SEARCH -->
<div class="search">
<input type="text" id="plantName" placeholder="Search plant (Tulsi, Neem)">
<button onclick="searchPlant()">Search</button>
</div>

<!-- PLANTS -->
<div class="plant-container" id="plantContainer"></div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">
    <span onclick="closePopup()">❌</span>
    <h2 id="plantTitle"></h2>
    <p id="plantInfo"></p>

    <!-- 3D MODEL -->
    <div id="modelContainer"></div>
  </div>
</div>

<script>

let plantsData = [];

// FETCH JSON
fetch("plant.json")
.then(res => res.json())
.then(data => {
plantsData = data;
displayPlants(plantsData);
});

// DISPLAY PLANTS
function displayPlants(data){
let container = document.getElementById("plantContainer");
container.innerHTML = "";

data.forEach(plant => {
container.innerHTML += `
<div class="plant-card" onclick="showDetails('${plant.commonName}','${plant.botanicalName}','${plant.uses}','${plant.habitat}','${plant.cultivation}')">
<img src="${plant.image}">
<h3>${plant.commonName}</h3>
<p>${plant.botanicalName}</p>
</div>
`;
});
}

// SEARCH FUNCTION
function searchPlant(){
let input = document.getElementById("plantName").value.toLowerCase();

let filtered = plantsData.filter(plant =>
plant.commonName.toLowerCase().includes(input)
);

displayPlants(filtered);
}

// 3D MODEL
function loadModel(){

let container = document.getElementById("modelContainer");
container.innerHTML = "";

// scene
let scene = new THREE.Scene();

// camera
let camera = new THREE.PerspectiveCamera(
75,
container.clientWidth / container.clientHeight,
0.1,
1000
);

// renderer
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(container.clientWidth, container.clientHeight);
container.appendChild(renderer.domElement);

// LIGHT
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(2,2,5);
scene.add(light);

// model
let geometry = new THREE.ConeGeometry(0.8, 2, 32);
let material = new THREE.MeshStandardMaterial({color: 0x228B22});
let model = new THREE.Mesh(geometry, material);

scene.add(model);

// camera position
camera.position.z = 3;

// animation
function animate(){
requestAnimationFrame(animate);
model.rotation.y += 0.01;
renderer.render(scene, camera);
}
animate();
}

// SHOW POPUP
function showDetails(name, botanical, uses, habitat, cultivation){

document.getElementById("plantTitle").innerText = name;

document.getElementById("plantInfo").innerHTML = `
<b>Botanical Name:</b> ${botanical} <br><br>
<b>Uses:</b> ${uses} <br><br>
<b>Habitat:</b> ${habitat} <br><br>
<b>Cultivation:</b> ${cultivation}
`;

document.getElementById("popup").style.display = "flex";

// delay fix
setTimeout(loadModel, 100);
}

// CLOSE POPUP
function closePopup(){
document.getElementById("popup").style.display = "none";
}

// CLICK OUTSIDE CLOSE
window.onclick = function(e){
let popup = document.getElementById("popup");
if(e.target == popup){
popup.style.display = "none";
}
}

</script>

</body>
</html>
